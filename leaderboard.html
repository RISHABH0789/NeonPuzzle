<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neon Puzzle | Leaderboard</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .back-btn { display: block; width: fit-content; margin: 40px auto; padding: 12px 25px; border: 1px solid #00C7FF; color: #00C7FF; text-decoration: none; border-radius: 5px; transition: 0.3s; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="background-glow"></div>
    <div class="glass-card">
    <h1 class="neon-text">RANKINGS</h1>

    <div class="mode-tabs">
        <button onclick="fetchLeaderboard('easy')" class="tab-btn">5x5</button>
        <button onclick="fetchLeaderboard('medium')" class="tab-btn">7x7</button>
        <button onclick="fetchLeaderboard('hard')" class="tab-btn">9x9</button>
    </div>

    <table class="leaderboard-table">
        <thead>
            <tr>
                <th>RANK</th>
                <th>PLAYER</th>
                <th>TIME</th>
            </tr>
        </thead>
        <tbody id="leaderboard-data">
            </tbody>
    </table>
        <button onclick="window.location.href='home.html'" class="menu-btn back-btn">BACK</button>
</div>

    <script src="js/leaderboard.js"></script>
</body>
</html>
